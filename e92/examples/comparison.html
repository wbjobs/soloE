<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日志分析 - 火焰图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; margin-bottom: 16px; color: #333; }
    .header { display: flex; gap: 24px; margin-bottom: 20px; padding: 16px; background: #f8f9fa; border-radius: 6px; flex-wrap: wrap; }
    .header-item { display: flex; flex-direction: column; }
    .header-label { font-size: 12px; color: #666; margin-bottom: 4px; }
    .header-value { font-size: 16px; font-weight: 600; color: #333; }
    .flame-container { position: relative; overflow-x: auto; background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; }
    .flame-svg { display: block; }
    .flame-bar { cursor: pointer; transition: opacity 0.2s; }
    .flame-bar:hover { opacity: 0.8; }
    .tooltip { position: fixed; background: rgba(0,0,0,0.85); color: white; padding: 10px 12px; border-radius: 4px; font-size: 12px; pointer-events: none; z-index: 1000; max-width: 300px; }
    .tooltip .title { font-weight: 600; margin-bottom: 6px; }
    .tooltip .row { display: flex; justify-content: space-between; gap: 16px; margin: 2px 0; }
    .tooltip .label { color: #aaa; }
    .tooltip .value { color: #fff; }
    .legend { display: flex; gap: 16px; margin-top: 16px; padding: 12px; background: #f8f9fa; border-radius: 4px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .legend-color { width: 16px; height: 16px; border-radius: 2px; }
    .timeline { position: relative; height: 24px; background: #f0f0f0; border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
    .timeline-mark { position: absolute; top: 0; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; border-left: 1px solid #ccc; }
    .error-badge { background: #F44336; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
    .trace-list { margin-top: 20px; }
    .trace-item { padding: 12px; border: 1px solid #e0e0e0; border-radius: 4px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
    .trace-item:hover { border-color: #2196F3; background: #f0f8ff; }
    .trace-item.active { border-color: #2196F3; background: #e3f2fd; }
    .trace-info { display: flex; justify-content: space-between; align-items: center; }
    .trace-id { font-family: monospace; font-size: 13px; }
    .trace-duration { font-weight: 600; color: #2196F3; }
    .comparison-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .comparison-table th, .comparison-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #e0e0e0; font-size: 13px; }
    .comparison-table th { background: #f5f5f5; font-weight: 600; }
    .diff-positive { color: #F44336; }
    .diff-negative { color: #4CAF50; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab { padding: 8px 16px; border: none; background: #e0e0e0; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .tab.active { background: #2196F3; color: white; }
    .comparison-select { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; padding: 12px; background: #f8f9fa; border-radius: 4px; }
    .comparison-select select { padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    .comparison-select button { padding: 6px 16px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .comparison-select button:hover { background: #1976D2; }
    .hidden { display: none; }
    .service-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat-card { padding: 12px; background: #f8f9fa; border-radius: 4px; }
    .stat-card .label { font-size: 11px; color: #666; margin-bottom: 4px; }
    .stat-card .value { font-size: 18px; font-weight: 600; color: #333; }
    .main-content { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
    @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 日志分析工具 - 火焰图</h1>
    
    <div class="tabs">
      <button class="tab active" data-tab="flame">🔥 火焰图</button>
      <button class="tab" data-tab="compare">⚖️ 调用链对比</button>
      <button class="tab" data-tab="stats">📈 统计信息</button>
    </div>

    <div id="tab-flame" class="tab-content">
      <div class="main-content">
        <div id="trace-list"></div>
        <div>
          <div class="header" id="trace-header"></div>
          <div class="flame-container">
            <div id="flame-graph"></div>
          </div>
          <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background: #4CAF50"></div>user-srv</div>
            <div class="legend-item"><div class="legend-color" style="background: #2196F3"></div>order-srv</div>
            <div class="legend-item"><div class="legend-color" style="background: #FF9800"></div>payment-srv</div>
            <div class="legend-item"><div class="legend-color" style="background: #F44336"></div>错误</div>
            <div class="legend-item"><div class="legend-color" style="background: #9E9E9E"></div>未知服务</div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-compare" class="tab-content hidden">
      <div class="comparison-select">
        <span>调用链 1:</span>
        <select id="select-trace1"></select>
        <span>调用链 2:</span>
        <select id="select-trace2"></select>
        <button id="btn-compare">开始对比</button>
      </div>
      <div id="comparison"></div>
    </div>

    <div id="tab-stats" class="tab-content hidden">
      <div id="stats-content"></div>
    </div>
  </div>

    const colorPalette = {"user-srv":"#4CAF50","order-srv":"#2196F3","payment-srv":"#FF9800","unknown":"#9E9E9E","error":"#F44336"};
    
    function getServiceColor(service, hasError) {
      if (hasError) return colorPalette['error'];
      return colorPalette[service] || colorPalette['unknown'];
    }

    function formatDuration(ms) {
      if (ms < 1) return (ms * 1000).toFixed(0) + 'μs';
      if (ms < 1000) return ms.toFixed(2) + 'ms';
      return (ms / 1000).toFixed(2) + 's';
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleString();
    }

    function flattenSpans(spans, startTime, depth = 0) {
      const result = [];
      for (const span of spans) {
        const relativeStart = span.start - startTime;
        const duration = span.duration || 0;
        result.push({
          spanId: span.spanId,
          service: span.service,
          operation: span.operation,
          start: relativeStart,
          duration,
          depth,
          hasError: span.status === 'error' || span.level === 'error',
          logs: span.logs,
          children: span.children
        });
        if (span.children && span.children.length > 0) {
          result.push(...flattenSpans(span.children, startTime, depth + 1));
        }
      }
      return result;
    }

    function generateFlameGraphData(analyzedTrace) {
      const startTime = analyzedTrace.startTime;
      const flattened = flattenSpans(analyzedTrace.spans, startTime);
      const maxDepth = Math.max(...flattened.map(s => s.depth), 0);
      return {
        traceId: analyzedTrace.traceId,
        totalDuration: analyzedTrace.totalDuration,
        startTime,
        endTime: analyzedTrace.endTime,
        services: analyzedTrace.services,
        maxDepth,
        spans: flattened
      };
    }

    function renderFlameGraph(graphData, containerId) {
      const container = document.getElementById(containerId);
      if (!container || !graphData) return;

      const barHeight = 24;
      const padding = 10;
      const width = Math.max(1200, graphData.totalDuration / 2);
      const height = (graphData.maxDepth + 1) * barHeight + padding * 2 + 40;
      const totalDuration = graphData.totalDuration;
      const pixelsPerMs = (width - padding * 2) / totalDuration;

      let html = '';
      html += '<div class="timeline" style="width: ' + width + 'px">';
      const ticks = 5;
      for (let i = 0; i <= ticks; i++) {
        const pos = (i / ticks) * 100;
        const time = (i / ticks) * totalDuration;
        html += '<div class="timeline-mark" style="left: ' + pos + '%">' + formatDuration(time) + '</div>';
      }
      html += '</div>';
      
      html += '<svg class="flame-svg" width="' + width + '" height="' + height + '">';

      for (const span of graphData.spans) {
        const x = padding + span.start * pixelsPerMs;
        const y = height - padding - (span.depth + 1) * barHeight;
        const rectWidth = Math.max(span.duration * pixelsPerMs, 2);
        const color = getServiceColor(span.service, span.hasError);
        const label = span.service + ' > ' + span.operation;
        const displayLabel = rectWidth > 80 ? label.substring(0, Math.floor(rectWidth / 7)) + (rectWidth / 7 < label.length ? '...' : '') : '';

        html += '<g class="flame-bar" data-span='' + encodeURIComponent(JSON.stringify(span)) + ''>';
        html += '<rect x="' + x + '" y="' + y + '" width="' + rectWidth + '" height="' + (barHeight - 2) + '" fill="' + color + '" rx="2"/>';
        if (displayLabel) {
          html += '<text x="' + (x + 6) + '" y="' + (y + barHeight / 2 + 4) + '" fill="white" font-size="11" font-family="monospace">' + displayLabel + '</text>';
        }
        html += '</g>';
      }

      html += '</svg>';
      container.innerHTML = html;

      const bars = container.querySelectorAll('.flame-bar');
      let tooltip = document.querySelector('.tooltip');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.className = 'tooltip';
        tooltip.style.display = 'none';
        document.body.appendChild(tooltip);
      }

      bars.forEach(bar => {
        bar.addEventListener('mousemove', (e) => {
          const spanData = JSON.parse(decodeURIComponent(bar.dataset.span));
          tooltip.style.display = 'block';
          tooltip.style.left = (e.clientX + 15) + 'px';
          tooltip.style.top = (e.clientY + 15) + 'px';
          
          let logPreview = '';
          if (spanData.logs && spanData.logs.length > 0) {
            logPreview = '<div class="row"><span class="label">日志数:</span><span class="value">' + spanData.logs.length + '</span></div>';
            const lastLog = spanData.logs[spanData.logs.length - 1];
            if (lastLog.message) {
              logPreview += '<div style="margin-top:4px; padding-top:4px; border-top:1px solid #444"><strong>最新日志:</strong><br>' + lastLog.message.substring(0, 100) + '</div>';
            }
          }

          tooltip.innerHTML = '<div class="title">' + spanData.service + ' > ' + spanData.operation + '</div>' +
            '<div class="row"><span class="label">耗时:</span><span class="value">' + formatDuration(spanData.duration) + '</span></div>' +
            '<div class="row"><span class="label">开始偏移:</span><span class="value">' + formatDuration(spanData.start) + '</span></div>' +
            '<div class="row"><span class="label">层级:</span><span class="value">' + spanData.depth + '</span></div>' +
            (spanData.hasError ? '<div class="row"><span class="error-badge">ERROR</span></div>' : '') +
            logPreview;
        });

        bar.addEventListener('mouseleave', () => {
          tooltip.style.display = 'none';
        });
      });
    }

    function renderTraceHeader(trace) {
      const container = document.getElementById('trace-header');
      container.innerHTML = '<div class="header-item"><span class="header-label">Trace ID</span><span class="header-value" style="font-family: monospace; font-size: 13px;">' + trace.traceId + '</span></div>' +
        '<div class="header-item"><span class="header-label">总耗时</span><span class="header-value">' + formatDuration(trace.totalDuration) + '</span></div>' +
        '<div class="header-item"><span class="header-label">开始时间</span><span class="header-value">' + formatTime(trace.startTime) + '</span></div>' +
        '<div class="header-item"><span class="header-label">服务数</span><span class="header-value">' + trace.services.length + '</span></div>' +
        '<div class="header-item"><span class="header-label">跨度数</span><span class="header-value">' + trace.spanCount + '</span></div>' +
        (trace.errorCount > 0 ? '<div class="header-item"><span class="header-label">错误</span><span class="header-value" style="color: #F44336;">' + trace.errorCount + '</span></div>' : '');
    }

    function renderTraceList(traces, onSelect) {
      const container = document.getElementById('trace-list');
      if (!container) return;

      let html = '<h3 style="margin-bottom: 12px;">调用链列表</h3>';
      html += '<div class="trace-list">';
      
      const sortedTraces = [...traces].sort((a, b) => b.totalDuration - a.totalDuration);
      
      for (let i = 0; i < sortedTraces.length; i++) {
        const trace = sortedTraces[i];
        const hasError = trace.errorCount > 0;
        const isActive = i === 0 ? 'active' : '';
        html += '<div class="trace-item ' + isActive + '" data-trace-id="' + trace.traceId + '">' +
          '<div class="trace-info">' +
            '<span class="trace-id">' + trace.traceId.substring(0, 16) + '...' + (hasError ? ' <span class="error-badge">' + trace.errorCount + ' 错误</span>' : '') + '</span>' +
            '<span class="trace-duration">' + formatDuration(trace.totalDuration) + '</span>' +
          '</div>' +
          '<div style="font-size: 11px; color: #666; margin-top: 4px">' +
            trace.services.join(', ') +
          '</div>' +
        '</div>';
      }
      html += '</div>';
      container.innerHTML = html;

      container.querySelectorAll('.trace-item').forEach(item => {
        item.addEventListener('click', () => {
          container.querySelectorAll('.trace-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          onSelect(item.dataset.traceId);
        });
      });
    }

    function compareTraces(trace1, trace2) {
      const getFlattenSpans = (spans, prefix = '') => {
        const result = [];
        for (const span of spans) {
          const key = prefix + span.service + ':' + span.operation;
          result.push({
            key,
            service: span.service,
            operation: span.operation,
            duration: span.duration || 0
          });
          if (span.children.length > 0) {
            result.push(...getFlattenSpans(span.children, key + ' > '));
          }
        }
        return result;
      };

      const spans1 = getFlattenSpans(trace1.spans);
      const spans2 = getFlattenSpans(trace2.spans);

      const map1 = new Map(spans1.map(s => [s.key, s]));
      const map2 = new Map(spans2.map(s => [s.key, s]));

      const allKeys = new Set([...map1.keys(), ...map2.keys()]);
      const comparison = [];

      for (const key of allKeys) {
        const s1 = map1.get(key);
        const s2 = map2.get(key);
        
        const d1 = s1 ? s1.duration : 0;
        const d2 = s2 ? s2.duration : 0;
        const diff = d2 - d1;
        const diffPercent = d1 > 0 ? ((diff / d1) * 100).toFixed(2) : (d2 > 0 ? '100' : '0');

        comparison.push({
          key,
          service: s1?.service || s2?.service,
          operation: s1?.operation || s2?.operation,
          duration1: d1,
          duration2: d2,
          diff,
          diffPercent: Number(diffPercent),
          inTrace1: !!s1,
          inTrace2: !!s2
        });
      }

      return {
        trace1: {
          traceId: trace1.traceId,
          totalDuration: trace1.totalDuration,
          spanCount: trace1.spanCount
        },
        trace2: {
          traceId: trace2.traceId,
          totalDuration: trace2.totalDuration,
          spanCount: trace2.spanCount
        },
        totalDiff: trace2.totalDuration - trace1.totalDuration,
        totalDiffPercent: ((trace2.totalDuration - trace1.totalDuration) / trace1.totalDuration * 100).toFixed(2),
        details: comparison.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff))
      };
    }

    function renderComparison(comparison) {
      const container = document.getElementById('comparison');
      if (!container || !comparison) return;

      let html = '<div style="margin-bottom: 16px; padding: 12px; background: #f8f9fa; border-radius: 4px;">';
      html += '<div style="display: flex; gap: 24px; flex-wrap: wrap; align-items: center;">';
      html += '<div><strong>Trace 1:</strong> ' + comparison.trace1.traceId + ' (' + formatDuration(comparison.trace1.totalDuration) + ')</div>';
      html += '<div style="font-size: 20px;">→</div>';
      html += '<div><strong>Trace 2:</strong> ' + comparison.trace2.traceId + ' (' + formatDuration(comparison.trace2.totalDuration) + ')</div>';
      html += '<div style="margin-left: auto;"><strong>总差异:</strong> <span class="' + (comparison.totalDiff > 0 ? 'diff-positive' : 'diff-negative') + '">' + 
        (comparison.totalDiff > 0 ? '+' : '') + formatDuration(comparison.totalDiff) + 
        ' (' + (comparison.totalDiff > 0 ? '+' : '') + comparison.totalDiffPercent + '%)</span></div>';
      html += '</div></div>';

      html += '<table class="comparison-table">';
      html += '<thead><tr><th>路径</th><th>Trace 1 (ms)</th><th>Trace 2 (ms)</th><th>差异 (ms)</th><th>差异 (%)</th></tr></thead>';
      html += '<tbody>';
      
      for (const detail of comparison.details) {
        const diffClass = detail.diff > 0 ? 'diff-positive' : 'diff-negative';
        html += '<tr>';
        html += '<td style="font-family: monospace; font-size: 12px;">' + detail.key + '</td>';
        html += '<td>' + (detail.inTrace1 ? detail.duration1.toFixed(2) : '-') + '</td>';
        html += '<td>' + (detail.inTrace2 ? detail.duration2.toFixed(2) : '-') + '</td>';
        html += '<td class="' + diffClass + '">' + (detail.diff > 0 ? '+' : '') + detail.diff.toFixed(2) + '</td>';
        html += '<td class="' + diffClass + '">' + (detail.diffPercent > 0 ? '+' : '') + detail.diffPercent + '%</td>';
        html += '</tr>';
      }
      
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function renderStats(traces) {
      const container = document.getElementById('stats-content');
      
      const serviceStats = new Map();
      let totalTraces = traces.length;
      let totalSpans = 0;
      let totalErrors = 0;
      let totalDuration = 0;

      for (const trace of traces) {
        totalSpans += trace.spanCount;
        totalErrors += trace.errorCount;
        totalDuration += trace.totalDuration;
        
        const processSpans = (spans) => {
          for (const span of spans) {
            if (!serviceStats.has(span.service)) {
              serviceStats.set(span.service, {
                service: span.service,
                totalCalls: 0,
                totalDuration: 0,
                errors: 0
              });
            }
            const stats = serviceStats.get(span.service);
            stats.totalCalls++;
            stats.totalDuration += span.duration || 0;
            if (span.status === 'error') {
              stats.errors++;
            }
            if (span.children.length > 0) {
              processSpans(span.children);
            }
          }
        };
        processSpans(trace.spans);
      }

      let html = '<h3>总体统计</h3>';
      html += '<div class="service-stats">';
      html += '<div class="stat-card"><div class="label">调用链总数</div><div class="value">' + totalTraces + '</div></div>';
      html += '<div class="stat-card"><div class="label">总跨度数</div><div class="value">' + totalSpans + '</div></div>';
      html += '<div class="stat-card"><div class="label">总错误数</div><div class="value" style="color: ' + (totalErrors > 0 ? '#F44336' : '#333') + '">' + totalErrors + '</div></div>';
      html += '<div class="stat-card"><div class="label">平均耗时</div><div class="value">' + formatDuration(totalDuration / totalTraces) + '</div></div>';
      html += '</div>';

      html += '<h3 style="margin-top: 20px;">服务统计</h3>';
      html += '<table class="comparison-table">';
      html += '<thead><tr><th>服务</th><th>总调用次数</th><th>总耗时 (ms)</th><th>平均耗时 (ms)</th><th>错误数</th></tr></thead>';
      html += '<tbody>';
      
      for (const stats of serviceStats.values()) {
        const avg = stats.totalCalls > 0 ? stats.totalDuration / stats.totalCalls : 0;
        html += '<tr>';
        html += '<td><strong>' + stats.service + '</strong></td>';
        html += '<td>' + stats.totalCalls + '</td>';
        html += '<td>' + stats.totalDuration.toFixed(2) + '</td>';
        html += '<td>' + avg.toFixed(2) + '</td>';
        html += '<td style="color: ' + (stats.errors > 0 ? '#F44336' : '#333') + '">' + stats.errors + '</td>';
        html += '</tr>';
      }
      
      html += '</tbody></table>';

      const sortedTraces = [...traces].sort((a, b) => b.totalDuration - a.totalDuration);
      html += '<h3 style="margin-top: 20px;">最慢的 10 条调用链</h3>';
      html += '<table class="comparison-table">';
      html += '<thead><tr><th>Trace ID</th><th>耗时</th><th>服务</th><th>跨度数</th><th>错误</th></tr></thead>';
      html += '<tbody>';
      
      for (let i = 0; i < Math.min(10, sortedTraces.length); i++) {
        const trace = sortedTraces[i];
        html += '<tr>';
        html += '<td style="font-family: monospace;">' + trace.traceId + '</td>';
        html += '<td><strong>' + formatDuration(trace.totalDuration) + '</strong></td>';
        html += '<td>' + trace.services.join(', ') + '</td>';
        html += '<td>' + trace.spanCount + '</td>';
        html += '<td style="color: ' + (trace.errorCount > 0 ? '#F44336' : '#333') + '">' + trace.errorCount + '</td>';
        html += '</tr>';
      }
      
      html += '</tbody></table>';
      
      container.innerHTML = html;
    }

    function showTrace(traceId) {
      const trace = tracesData.find(t => t.traceId === traceId);
      if (trace) {
        const graphData = generateFlameGraphData(trace);
        renderTraceHeader(trace);
        renderFlameGraph(graphData, 'flame-graph');
      }
    }

    function init() {
      if (tracesData.length === 0) {
        document.getElementById('app').innerHTML = '<p style="color: #666;">没有找到调用链数据</p>';
        return;
      }

      renderTraceList(tracesData, showTrace);
      showTrace(tracesData[0].traceId);
      renderStats(tracesData);

      const select1 = document.getElementById('select-trace1');
      const select2 = document.getElementById('select-trace2');
      tracesData.forEach((t, i) => {
        const opt1 = document.createElement('option');
        opt1.value = t.traceId;
        opt1.textContent = t.traceId + ' (' + formatDuration(t.totalDuration) + ')';
        select1.appendChild(opt1);
        
        const opt2 = document.createElement('option');
        opt2.value = t.traceId;
        opt2.textContent = t.traceId + ' (' + formatDuration(t.totalDuration) + ')';
        if (i === 1) opt2.selected = true;
        select2.appendChild(opt2);
      });

      document.getElementById('btn-compare').addEventListener('click', () => {
        const t1 = tracesData.find(t => t.traceId === select1.value);
        const t2 = tracesData.find(t => t.traceId === select2.value);
        if (t1 && t2) {
          const comparison = compareTraces(t1, t2);
          renderComparison(comparison);
        }
      });

      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
          tab.classList.add('active');
          document.getElementById('tab-' + tab.dataset.tab).classList.remove('hidden');
        });
      });
    }

    init();
  </script>
</body>
</html>
