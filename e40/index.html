<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU 3D流体烟雾模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #stats {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #00ff88;
      font-size: 14px;
      line-height: 1.8;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 136, 0.3);
      min-width: 200px;
    }
    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #fff;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      min-width: 250px;
    }
    .control-group {
      margin-bottom: 12px;
    }
    .control-group label {
      display: block;
      margin-bottom: 5px;
      color: #aaa;
    }
    .control-group input[type="range"] {
      width: 100%;
    }
    .value-display {
      text-align: right;
      color: #00ff88;
      font-size: 12px;
    }
    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #888;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="gpuCanvas"></canvas>
  <div id="stats">
    <div>FPS: <span id="fps">0</span></div>
    <div>活动/总粒子: <span id="particles">0</span></div>
    <div>渲染模式: <span id="gpuTime">0</span></div>
    <div>池使用率: <span id="resolution">0</span></div>
    <div>空闲粒子: <span id="freeParticles">0</span></div>
  </div>
  <div id="controls">
    <div class="control-group">
      <label>风速 X</label>
      <input type="range" id="windX" min="-5" max="5" step="0.1" value="0">
      <div class="value-display"><span id="windXVal">0</span></div>
    </div>
    <div class="control-group">
      <label>风速 Y</label>
      <input type="range" id="windY" min="-5" max="5" step="0.1" value="0">
      <div class="value-display"><span id="windYVal">0</span></div>
    </div>
    <div class="control-group">
      <label>风速 Z</label>
      <input type="range" id="windZ" min="-5" max="5" step="0.1" value="0">
      <div class="value-display"><span id="windZVal">0</span></div>
    </div>
    <div class="control-group">
      <label>扩散速率</label>
      <input type="range" id="diffusion" min="0" max="1" step="0.01" value="0.1">
      <div class="value-display"><span id="diffusionVal">0.1</span></div>
    </div>
    <div class="control-group">
      <label>消散速率</label>
      <input type="range" id="dissipation" min="0" max="1" step="0.01" value="0.02">
      <div class="value-display"><span id="dissipationVal">0.02</span></div>
    </div>
    <div class="control-group">
      <label>烟雾强度</label>
      <input type="range" id="emission" min="1" max="20" step="1" value="5">
      <div class="value-display"><span id="emissionVal">5</span></div>
    </div>
    <div class="control-group">
      <label>粒子密度/次</label>
      <input type="range" id="particleDensity" min="0.1" max="1" step="0.1" value="0.4">
      <div class="value-display"><span id="particleDensityVal">200</span></div>
    </div>
  </div>
  <div id="instructions">
    按住鼠标左键拖拽在3D空间中添加烟雾源 | 鼠标旋转视角 | 滚轮缩放
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
