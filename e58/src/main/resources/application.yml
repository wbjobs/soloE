spring:
  application:
    name: distributed-task-scheduler

  datasource:
    url: jdbc:postgresql://localhost:5432/task_scheduler
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

server:
  port: 8080
  servlet:
    context-path: /api

scheduler:
  worker:
    id: ${HOSTNAME:worker-${random.uuid}}
    heartbeat-interval: 5000
    task-timeout: 300000
    max-concurrent-tasks: 5

  queue:
    stream-key: task_stream
    consumer-group: worker_group
    poll-timeout: 2000

  retry:
    max-attempts: 5
    initial-delay: 1000
    multiplier: 2.0
    max-delay: 60000

  priority:
    levels:
      HIGH: 100
      MEDIUM: 50
      LOW: 10
    preemption-enabled: true

logging:
  level:
    root: INFO
    com.scheduler: DEBUG
    org.springframework.data.redis: DEBUG
