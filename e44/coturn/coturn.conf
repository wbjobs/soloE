# ======================================================================
# P2P CDN 系统 Coturn 配置文件
# ======================================================================
# 请根据实际部署环境修改以下配置

# ----------------------------------------------------------------------
# 监听配置
# ----------------------------------------------------------------------

# 监听端口
listening-port=3478
tls-listening-port=5349

# 监听 IP 地址（内网 IP）
# 多个内网 IP 需要多行配置
listening-ip=0.0.0.0

# 外部 IP 地址（公网 IP）
# 格式：外部 IP/内部 IP
# 如果服务器只有一个公网 IP，只写公网 IP 即可
external-ip=YOUR_PUBLIC_IP_ADDRESS

# 可选：同时监听 IPv6
# listening-ip=::

# ----------------------------------------------------------------------
# 认证配置
# ----------------------------------------------------------------------

# 认证域（建议使用你的域名）
realm=p2p-cdn-system

# 长期凭证机制的用户名和密码
# 格式：用户名:密码
# 生产环境请使用强密码并定期更换
user=p2pcdn:p2pcdn123

# 启用长期凭证机制
lt-cred-mech

# nonce 过期时间（秒）
stale-nonce=600

# 禁用旧的安全性差的认证机制
no-auth
# 如果需要启用密码认证，请注释上面的 no-auth 并启用以下选项：
# use-auth-secret
# static-auth-secret=your-secret-key-here

# ----------------------------------------------------------------------
# TLS 配置（生产环境建议启用）
# ----------------------------------------------------------------------

# TLS 证书和私钥路径
# cert=/etc/letsencrypt/live/turn.yourdomain.com/cert.pem
# pkey=/etc/letsencrypt/live/turn.yourdomain.com/privkey.pem

# TLS 协议版本
# tls-listening-port=5349
# no-tlsv1
# no-tlsv1_1

# ----------------------------------------------------------------------
# 性能配置
# ----------------------------------------------------------------------

# 中继线程数量（根据 CPU 核心数调整）
relay-threads=10

# 单用户最大带宽限制 (bytes/sec)
max-bps=10485760

# 总带宽容量 (0 = 无限制)
bps-capacity=0

# 最大分配数量
max-allocate-lifetime=3600

# 最小分配端口
min-port=49152

# 最大分配端口
max-port=65535

# ----------------------------------------------------------------------
# 安全配置
# ----------------------------------------------------------------------

# 禁止某些危险的对等 IP 范围
# 禁止本地回环
denied-peer-ip=127.0.0.0-127.255.255.255

# 禁止私有网络（如果你的用户不在这些网络中）
# denied-peer-ip=10.0.0.0-10.255.255.255
# denied-peer-ip=172.16.0.0-172.31.255.255
# denied-peer-ip=192.168.0.0-192.168.255.255

# 允许的对等 IP 范围（白名单优先）
# allowed-peer-ip=0.0.0.0-255.255.255.255

# 禁用 CLI 管理端口的远程访问
no-cli

# CLI 端口（仅本地访问）
cli-port=5766
cli-password=change-this-cli-password

# ----------------------------------------------------------------------
# 日志配置
# ----------------------------------------------------------------------

# 日志文件路径
log-file=/var/log/turnserver/turnserver.log

# 简单日志（生产环境建议关闭 verbose）
verbose

# 启用 syslog
# syslog

# ----------------------------------------------------------------------
# 统计配置
# ----------------------------------------------------------------------

# 统计输出文件
# stats-output-file=/var/log/turnserver/stats.log

# 统计输出周期（秒）
# stats-period=60

# ----------------------------------------------------------------------
# Web 管理界面（可选）
# ----------------------------------------------------------------------

# 启用 Web 管理
# web-admin
# web-admin-port=8080
# web-admin-ip=0.0.0.0
# web-admin-password=your-admin-password

# ----------------------------------------------------------------------
# 高级配置
# ----------------------------------------------------------------------

# 启用指纹
fingerprint

# 禁用 TCP 中继（如果只需要 UDP）
# no-tcp-relay

# Quota 配置
# user-quota=p2pcdn:1000  # 单个用户最大并发会话
# total-quota=10000        # 系统总并发会话

# Redis 数据库支持（用于集群部署）
# redis-userdb="ip=127.0.0.1 port=6379 dbname=0 password=redis-password"

# 服务器名称
server-name=p2p-cdn-turn-server

# 组织名称
organization=P2P_CDN_Organization

# ----------------------------------------------------------------------
# 调试配置（生产环境建议关闭）
# ----------------------------------------------------------------------

# 启用详细调试
# Verbose

# 启用软工作流
# no-software-attribute

# 允许环回测试
# allow-loopback-peers

# ======================================================================
# 配置检查清单
# ======================================================================
# 1. [ ] 更新 external-ip 为公网 IP 地址
# 2. [ ] 更新 user 为强密码
# 3. [ ] 配置 TLS 证书（生产环境必须）
# 4. [ ] 更新 realm 为你的域名
# 5. [ ] 配置防火墙开放端口
# 6. [ ] 检查并更新 denied-peer-ip/allowed-peer-ip
# 7. [ ] 生产环境关闭 verbose 日志
# 8. [ ] 定期轮转日志
