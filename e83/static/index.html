<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eBPF Syscall Tracker - Hot Files Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e7;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px 32px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        label {
            font-size: 14px;
            color: #9ca3af;
        }

        input, select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px 16px;
            color: #e4e4e7;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-bar {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-left: auto;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-badge.warning {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-title {
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 24px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
        }

        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #9ca3af;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .file-list {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .file-list-header {
            display: grid;
            grid-template-columns: 60px 1fr 100px 100px 120px;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: #9ca3af;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .file-item {
            display: grid;
            grid-template-columns: 60px 1fr 100px 100px 120px;
            gap: 16px;
            padding: 14px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            align-items: center;
            transition: background 0.2s ease;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.03;
        }

        .rank {
            font-weight: 700;
            font-size: 18px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rank-1 { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #1a1a2e; }
        .rank-2 { background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%); color: #1a1a2e; }
        .rank-3 { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); color: #1a1a2e; }
        .rank-other { background: rgba(255, 255, 255, 0.1); color: #9ca3af; }

        .file-path {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: #e4e4e7;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .count-cell {
            text-align: right;
            font-weight: 600;
        }

        .ratio-bar {
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
        }

        .ratio-read {
            background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%);
            height: 100%;
        }

        .ratio-write {
            background: linear-gradient(90deg, #ef4444 0%, #f87171 100%);
            height: 100%;
        }

        .ratio-text {
            text-align: center;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
        }

        .alert-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 Hot Files Dashboard</h1>
            <div class="subtitle">eBPF Docker Container Filesystem Activity Monitor</div>
        </header>

        <div class="controls">
            <div class="input-group">
                <label for="containerId">容器 ID:</label>
                <input type="text" id="containerId" placeholder="输入容器 ID 或名称" style="width: 300px;">
            </div>
            <div class="input-group">
                <label for="refreshInterval">刷新间隔:</label>
                <select id="refreshInterval">
                    <option value="1000">1 秒</option>
                    <option value="3000" selected>3 秒</option>
                    <option value="5000">5 秒</option>
                    <option value="10000">10 秒</option>
                    <option value="30000">30 秒</option>
                </select>
            </div>
            <button id="fetchBtn" onclick="fetchData()">获取数据</button>
            <button id="autoRefreshBtn" onclick="toggleAutoRefresh()">
                <span id="autoRefreshText">开启自动刷新</span>
            </button>

            <div class="status-bar">
                <div id="statusBadge" class="status-badge" style="display: none;">
                    <div class="status-dot"></div>
                    <span id="statusText">就绪</span>
                </div>
            </div>
            <div id="lastUpdate" style="color: #9ca3af; font-size: 13px;"></div>
        </div>

        <div id="lostEventsAlert" class="alert alert-warning" style="display: none;">
            <span class="alert-icon">⚠️</span>
            <span id="lostEventsText">检测到事件丢失，部分数据可能不完整</span>
        </div>

        <div class="cards">
            <div class="card">
                <div class="card-title">监控文件总数</div>
                <div id="totalFiles" class="card-value">-</div>
            </div>
            <div class="card">
                <div class="card-title">总调用次数</div>
                <div id="totalCalls" class="card-value">-</div>
            </div>
            <div class="card">
                <div class="card-title">总读取次数</div>
                <div id="totalReads" class="card-value">-</div>
            </div>
            <div class="card">
                <div class="card-title">总写入次数</div>
                <div id="totalWrites" class="card-value">-</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">Top 10 最热文件 - 读写比例热力图</div>
            </div>
            <div class="chart-wrapper">
                <canvas id="hotFilesChart"></canvas>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(90deg, #3b82f6 0%, #60a5fa 100%);"></div>
                    <span>Read</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: linear-gradient(90deg, #ef4444 0%, #f87171 100%);"></div>
                    <span>Write</span>
                </div>
            </div>
        </div>

        <div class="file-list">
            <div class="file-list-header">
                <div>排名</div>
                <div>文件路径</div>
                <div style="text-align: right;">读取</div>
                <div style="text-align: right;">写入</div>
                <div style="text-align: center;">读写比例</div>
            </div>
            <div id="fileListBody">
                <div class="empty-state">
                    <div class="empty-icon">📂</div>
                    <div>输入容器 ID 并点击"获取数据"开始监控</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart = null;
        let autoRefreshInterval = null;
        let isAutoRefreshing = false;
        let currentContainerId = '';

        function initChart() {
            const ctx = document.getElementById('hotFilesChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Read Count',
                            data: [],
                            backgroundColor: 'rgba(59, 130, 246, 0.8)',
                            borderColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 1,
                            borderRadius: 4,
                            borderSkipped: false,
                        },
                        {
                            label: 'Write Count',
                            data: [],
                            backgroundColor: 'rgba(239, 68, 68, 0.8)',
                            borderColor: 'rgba(239, 68, 68, 1)',
                            borderWidth: 1,
                            borderRadius: 4,
                            borderSkipped: false,
                        }
                    ]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                    plugins: {
                        legend: {
                            display: false,
                        },
                        tooltip: {
                            backgroundColor: 'rgba(26, 26, 46, 0.95)',
                            titleColor: '#e4e4e7',
                            bodyColor: '#e4e4e7',
                            borderColor: 'rgba(255, 255, 255, 0.2)',
                            borderWidth: 1,
                            padding: 12,
                            callbacks: {
                                label: function(context) {
                                    const label = context.dataset.label || '';
                                    const value = context.raw || 0;
                                    return `${label}: ${value.toLocaleString()}`;
                                }
                            }
                        }
                    },
                    },
                    scales: {
                        x: {
                            stacked: true,
                            grid: {
                            color: 'rgba(255, 255, 255, 0.05)',
                        },
                        ticks: {
                            color: '#9ca3af',
                        }
                    },
                        y: {
                            stacked: true,
                            grid: {
                                display: false,
                            },
                            ticks: {
                                color: '#e4e4e7',
                                font: {
                                    family: 'JetBrains Mono, monospace',
                                    size: 11,
                                },
                                callback: function(value, index, ticks) {
                                    const label = this.getLabelForValue(value);
                                    if (label.length > 40) {
                                        return '...' + label.slice(-37);
                                    }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
        }

        async function fetchData() {
            const containerId = document.getElementById('containerId').value.trim();
            if (!containerId) {
                currentContainerId = containerId;
            }

            if (!currentContainerId) {
                alert('请输入容器 ID');
                return;
            }

            const btn = document.getElementById('fetchBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> 加载中...';
            btn.disabled = true;

            try {
                const response = await fetch(`/results/${currentContainerId}?hot=true`);
                const data = await response.json();

                if (data.hot_files && data.hot_files.length > 0) {
                    updateChart(data.hot_files);
                    updateFileList(data.hot_files);
                    updateStats(data.hot_files);
                    updateLastUpdate(data.generated_at);
                    document.getElementById('statusBadge').style.display = 'flex';
                    document.getElementById('statusBadge').className = 'status-badge active';
                    document.getElementById('statusText').textContent = '已连接';
                } else {
                    showEmptyState();
                }

                const statsResponse = await fetch(`/stats/${currentContainerId}`);
                const statsData = await statsResponse.json();

                if (statsData.total_lost_events > 0) {
                    document.getElementById('lostEventsAlert').style.display = 'flex';
                    document.getElementById('lostEventsText').textContent =
                        `检测到 ${statsData.total_lost_events} 个事件丢失，部分数据可能不完整`;
                } else {
                    document.getElementById('lostEventsAlert').style.display = 'none';
                }

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('statusBadge').style.display = 'flex';
                document.getElementById('statusBadge').className = 'status-badge warning';
                document.getElementById('statusText').textContent = '连接失败';
                showEmptyState();
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function updateChart(hotFiles) {
            const labels = hotFiles.map(f => truncatePath(f.file_path));
            const readData = hotFiles.map(f => f.read_count);
            const writeData = hotFiles.map(f => f.write_count);

            chart.data.labels = labels;
            chart.data.datasets[0].data = readData;
            chart.data.datasets[1].data = writeData;
            chart.update('none');
        }

        function truncatePath(path) {
            if (path.length > 50) {
                const parts = path.split('/');
                if (parts.length > 3) {
                    return '.../' + parts.slice(-3).join('/');
                }
                return path.slice(0, 47) + '...';
            }
            return path;
        }

        function updateFileList(hotFiles) {
            const body = document.getElementById('fileListBody');
            body.innerHTML = '';

            hotFiles.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';

                const rankClass = index === 0 ? 'rank-1' :
                                  index === 1 ? 'rank-2' :
                                  index === 2 ? 'rank-3' : 'rank-other';

                item.innerHTML = `
                    <div>
                        <div class="rank ${rankClass}">${index + 1}</div>
                    </div>
                    <div class="file-path" title="${file.file_path}">${file.file_path}</div>
                    <div class="count-cell" style="color: #60a5fa;">${file.read_count.toLocaleString()}</div>
                    <div class="count-cell" style="color: #f87171;">${file.write_count.toLocaleString()}</div>
                    <div>
                        <div class="ratio-bar">
                            <div class="ratio-read" style="width: ${file.read_ratio * 100}%;"></div>
                            <div class="ratio-write" style="width: ${file.write_ratio * 100}%;"></div>
                        </div>
                        <div class="ratio-text">${file.ratio_label}</div>
                    </div>
                `;
                body.appendChild(item);
            });
        }

        function updateStats(hotFiles) {
            const totalFiles = hotFiles.length;
            const totalReads = hotFiles.reduce((sum, f) => sum + f.read_count, 0);
            const totalWrites = hotFiles.reduce((sum, f) => sum + f.write_count, 0);
            const totalCalls = totalReads + totalWrites;

            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('totalCalls').textContent = totalCalls.toLocaleString();
            document.getElementById('totalReads').textContent = totalReads.toLocaleString();
            document.getElementById('totalWrites').textContent = totalWrites.toLocaleString();
        }

        function updateLastUpdate(timestamp) {
            const date = new Date(Number(timestamp) / 1e6);
            document.getElementById('lastUpdate').textContent =
                `最后更新: ${date.toLocaleTimeString()}`;
        }

        function showEmptyState() {
            const body = document.getElementById('fileListBody');
            body.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <div>暂无数据，请确保容器正在被追踪</div>
                </div>
            `;
            if (chart) {
                chart.data.labels = [];
                chart.data.datasets[0].data = [];
                chart.data.datasets[1].data = [];
                chart.update();
            }
            document.getElementById('totalFiles').textContent = '-';
            document.getElementById('totalCalls').textContent = '-';
            document.getElementById('totalReads').textContent = '-';
            document.getElementById('totalWrites').textContent = '-';
        }

        function toggleAutoRefresh() {
            const btn = document.getElementById('autoRefreshBtn');
            const text = document.getElementById('autoRefreshText');

            if (isAutoRefreshing) {
                clearInterval(autoRefreshInterval);
                isAutoRefreshing = false;
                text.textContent = '开启自动刷新';
                btn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            } else {
                const interval = parseInt(document.getElementById('refreshInterval').value);
                autoRefreshInterval = setInterval(fetchData, interval);
                isAutoRefreshing = true;
                text.textContent = '停止自动刷新';
                btn.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
                fetchData();
            }
        }

        document.getElementById('containerId').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                fetchData();
            }
        });

        initChart();
    </script>
</body>
</html>
