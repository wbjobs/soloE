<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微前端系统 - Web Components</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif !important;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      min-height: 100vh !important;
    }

    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 1rem 2rem;
    }

    .nav {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-actions {
      display: flex;
      gap: 1rem;
    }

    .nav .btn {
      padding: 0.75rem 1.5rem !important;
      border: none !important;
      border-radius: 8px !important;
      font-size: 0.9rem !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      transition: all 0.3s ease !important;
      display: flex !important;
      align-items: center !important;
      gap: 0.5rem !important;
      font-family: 'Inter', sans-serif !important;
      line-height: 1.5 !important;
    }

    .nav .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      color: white !important;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4) !important;
    }

    .nav .btn-primary:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6) !important;
    }

    .nav .btn-secondary {
      background: #f3f4f6 !important;
      color: #374151 !important;
    }

    .nav .btn-secondary:hover {
      background: #e5e7eb !important;
      transform: translateY(-2px) !important;
    }

    .main-content {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
      color: white;
    }

    .hero h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .widget-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      padding: 2rem;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 0.875rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      display: inline-block;
      margin-right: 0.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 1rem;
      }

      .nav {
        flex-direction: column;
        gap: 1rem;
      }

      .hero h1 {
        font-size: 1.75rem;
      }

      .main-content {
        padding: 1rem;
      }

      .widget-container {
        padding: 1.5rem;
      }

      .btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <nav class="nav">
        <div class="logo">
          <i class="fas fa-cube"></i> MicroFE
        </div>
        <div class="nav-actions">
          <button class="btn btn-secondary" id="btn-home">
            <i class="fas fa-home"></i> 首页
          </button>
          <button class="btn btn-primary" id="btn-load-data">
            <i class="fas fa-download"></i> 加载数据
          </button>
        </div>
      </nav>
    </header>

    <main class="main-content">
      <div class="hero">
        <h1>微前端系统演示</h1>
        <p>基于 Web Components 的现代微前端架构</p>
      </div>

      <div class="widget-container">
        <micro-frontend></micro-frontend>
      </div>
    </main>

    <footer class="status-bar">
      <div>
        <span class="status-dot"></span>
        主应用运行中
      </div>
      <div id="event-log">等待事件...</div>
    </footer>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
