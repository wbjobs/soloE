<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC Screen Share</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <span>WebRTC Screen Share</span>
      </div>
      <div class="connection-status" id="connectionStatus">
        <span class="status-dot offline"></span>
        <span>未连接</span>
      </div>
    </header>

    <div class="main-content">
      <div class="sidebar">
        <div class="panel">
          <h3>连接控制</h3>
          <div class="form-group">
            <label>房间 ID</label>
            <input type="text" id="roomIdInput" placeholder="输入房间 ID">
          </div>
          <div class="button-group">
            <button id="createRoomBtn" class="btn btn-primary">创建房间</button>
            <button id="joinRoomBtn" class="btn btn-secondary">加入房间</button>
          </div>
          <button id="startSharingBtn" class="btn btn-success" disabled>开始共享屏幕</button>
          <button id="endCallBtn" class="btn btn-danger" disabled>结束通话</button>
        </div>

        <div class="panel">
          <h3>白板工具</h3>
          <div class="tool-group">
            <button class="tool-btn active" data-tool="pen" title="画笔">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7.5 17.5a2.121 2.121 0 0 1-3-3z"/>
              </svg>
            </button>
            <button class="tool-btn" data-tool="laser" title="激光笔">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20V10M18 20V4M6 20v-6"/>
              </svg>
            </button>
            <button class="tool-btn" data-tool="eraser" title="橡皮擦">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 20H7L3 16C2.8 15.9 2.6 15.7 2.5 15.5L2 15L6 11L10 15L14 11L18 15L17.5 15.5C17.4 15.7 17.2 15.9 17 16L20 20Z"/>
              </svg>
            </button>
            <button class="tool-btn" data-tool="clear" title="清空画布">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 6h18M19 6v14c0 1.1-.9 2-2 2H7c-1.1 0-2-.9-2-2V6m3 0V4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"/>
              </svg>
            </button>
          </div>
          <div class="form-group">
            <label>画笔颜色</label>
            <div class="color-picker">
              <input type="color" id="colorPicker" value="#1a1a1a">
              <div class="color-presets">
                <button class="color-preset" style="background: #1a1a1a" data-color="#1a1a1a"></button>
                <button class="color-preset" style="background: #e74c3c" data-color="#e74c3c"></button>
                <button class="color-preset" style="background: #3498db" data-color="#3498db"></button>
                <button class="color-preset" style="background: #2ecc71" data-color="#2ecc71"></button>
                <button class="color-preset" style="background: #f39c12" data-color="#f39c12"></button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>画笔粗细</label>
            <input type="range" id="brushSize" min="1" max="20" value="3">
            <span id="brushSizeValue">3</span>
          </div>
        </div>

        <div class="panel">
          <h3>屏幕选择</h3>
          <select id="sourceSelect" disabled>
            <option value="">选择共享源</option>
          </select>
        </div>
      </div>

      <div class="content-area">
        <div class="video-container" id="videoContainer">
          <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="video-overlay">
              <span class="video-label">对方屏幕</span>
            </div>
          </div>
          <div class="local-video-wrapper">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="video-overlay small">
              <span>我的屏幕</span>
            </div>
          </div>
        </div>

        <div class="whiteboard-container">
          <canvas id="whiteboard"></canvas>
          <div class="canvas-overlay" id="canvasOverlay">
            <svg width="100%" height="100%">
              <defs>
                <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                  <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill="url(#grid)"/>
            </svg>
          </div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="video">屏幕共享</button>
          <button class="tab-btn" data-tab="whiteboard">白板</button>
        </div>
      </div>
    </div>

    <div class="notification" id="notification"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.0/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
