<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU 2D 流体模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    .ui-overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      max-width: 300px;
    }

    .ui-overlay h1 {
      font-size: 18px;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #00f5d4, #00bbf9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ui-overlay p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .fps {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 14px;
      color: #00f5d4;
    }

    .no-webgpu {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
      background: rgba(0, 0, 0, 0.8);
      padding: 40px;
      border-radius: 16px;
      z-index: 1000;
    }

    .no-webgpu h2 {
      color: #ff6b6b;
      margin-bottom: 20px;
    }

    .no-webgpu p {
      margin-bottom: 10px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="fluidCanvas"></canvas>
    <div class="ui-overlay">
      <h1>🌊 WebGPU 流体模拟</h1>
      <p>按住鼠标左键并移动来"搅动"流体</p>
      <p>移动鼠标会向流体中添加力和颜色</p>
      <div class="fps" id="fps">FPS: --</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
