<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parquet Data Lineage</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .container { padding: 30px 40px; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #333; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #555; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover { background: #f8f9fa; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-secondary { background: #e9ecef; color: #495057; }
        .btn-secondary:hover { background: #dee2e6; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-info { background: #e3f2fd; color: #1976d2; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
        .empty p { font-size: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Parquet Data Lineage</h1>
        <p>Column-level lineage tracking for SQL queries</p>
    </div>
    <div class="container">
        <div class="card">
            <h2>Uploaded Lineage Graphs</h2>
            <div class="table-container">
                <table id="lineageTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Created</th>
                            <th>Nodes</th>
                            <th>Edges</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="lineageBody">
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="empty" style="display: none;">
                <p>No lineage graphs uploaded yet.</p>
                <p>Use the CLI tool to upload lineage data.</p>
            </div>
        </div>
    </div>

    <script>
        async function loadLineage() {
            const response = await fetch('/api/lineage');
            const data = await response.json();
            const tbody = document.getElementById('lineageBody');
            const emptyState = document.getElementById('emptyState');

            if (data.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><code>${item.id}</code></td>
                    <td>${item.name}</td>
                    <td>${new Date(item.created_at).toLocaleString()}</td>
                    <td><span class="badge badge-info">${item.node_count}</span></td>
                    <td><span class="badge badge-info">${item.edge_count}</span></td>
                    <td>
                        <a href="/lineage/${item.id}" class="btn btn-primary">View</a>
                        <button onclick="deleteLineage('${item.id}')" class="btn btn-danger">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteLineage(id) {
            if (confirm('Delete this lineage graph?')) {
                await fetch(`/api/lineage/${id}`, { method: 'DELETE' });
                loadLineage();
            }
        }

        loadLineage();
    </script>
</body>
</html>
